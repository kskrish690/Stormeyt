<div class="loading-screen">

  <div class="background-grid"></div>

  <div class="orb-container">

    <div class="scan-ring ring1"></div>
    <div class="scan-ring ring2"></div>
    <div class="scan-ring ring3"></div>


    <div class="weather-orb">

      <div class="planet"></div>

      <div class="cloud cloud1"></div>
      <div class="cloud cloud2"></div>


      <div class="lightning"></div>

    </div>


    <div class="particles">
      <span *ngFor="let p of particles"></span>
    </div>

  </div>



  <h1 class="logo">
    STORMEYT
  </h1>


  <p class="tagline">
    AI WEATHER INTELLIGENCE SYSTEM
  </p>


  <div class="status">
    <span class="dot"></span>
    {{message}}
  </div>



  <div class="progress">

    <div></div>

  </div>



<!-- Developer -->

<div class="developer">

    <span class="developer-title">

        DEVELOPED BY

    </span>

    <div class="developer-name">

        KRISHPREET SINGH AHLUWALIA

    </div>

</div>
